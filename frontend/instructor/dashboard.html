<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Auto24 — Панель инструктора</title>
<link rel="stylesheet" href="/static/css/instructor.css">
</head>
<body>

<div id="app">
  <div class="header">
    <div>
      <div class="header-name" id="header-name">—</div>
      <div class="header-role">Инструктор</div>
    </div>
    <button class="logout-btn" id="logoutBtn">Выйти</button>
  </div>

  <div class="tabbar">
    <div class="tab active" onclick="switchTab('requests')">📋 Заявки <span id="badge"></span></div>
    <div class="tab" onclick="switchTab('schedule')">📅 Расписание</div>
    <div class="tab" onclick="switchTab('settings')">⚙️ Настройки</div>
  </div>

  <div class="page active" id="page-requests">
    <div id="requests-list"><div class="loader">Загрузка...</div></div>
  </div>

  <div class="page" id="page-schedule">
    <div class="week-nav">
      <button class="week-btn" onclick="changeWeek(-1)">‹</button>
      <div class="week-label" id="week-label">—</div>
      <button class="week-btn" onclick="changeWeek(1)">›</button>
    </div>
    <div id="schedule-list"><div class="loader">Загрузка...</div></div>
  </div>

  <div class="page" id="page-settings">
    <div class="settings-card">
      <div class="settings-title">Сообщение при отказе</div>
      <div class="settings-desc">Это сообщение получит ученик если вы отклоните заявку без указания причины.</div>
      <textarea class="textarea" id="default-message" placeholder="Введите сообщение..."></textarea>
      <button class="btn btn-primary" onclick="saveDefaultMessage()">Сохранить</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="reject-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Отклонить запись</div>
    <div class="modal-sub" id="reject-modal-info"></div>
    <textarea class="textarea" id="reject-reason" placeholder="Причина (необязательно)..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-red" onclick="confirmReject()">Отклонить</button>
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/js/auth.js"></script>
<script src="/static/js/instructor.js"></script>
</body>
</html>
